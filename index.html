<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#17171C">
<title>Toyin · Baschet</title>
<style>
  :root{
    --red:#E11D2A; --red-dark:#B5121E;
    --ink:#17171C; --ink-2:#26262E;
    --bg:#F7F4F1; --card:#FFFFFF;
    --accent:#FF7A1A;            /* basketball orange */
    --win:#179E5C; --loss:#9A9AA3;
    --muted:#6C6C76; --line:#ECE7E2;
    --shadow:0 6px 22px rgba(23,23,28,.10);
    --r:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; overscroll-behavior-y:none;
  }
  .tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  input,select{font-family:inherit;font-size:16px}
  a{color:inherit}

  /* ---------- App shell ---------- */
  #app{max-width:520px;margin:0 auto;min-height:100vh;padding-bottom:84px}

  /* ---------- Header ---------- */
  .hdr{
    position:relative;color:#fff;padding:18px 18px 22px;
    background:
      radial-gradient(120% 90% at 100% 0%, rgba(255,122,26,.35), transparent 60%),
      linear-gradient(155deg, var(--ink) 0%, var(--ink-2) 45%, var(--red-dark) 140%);
    border-radius:0 0 26px 26px; overflow:hidden;
  }
  .hdr::after{content:"";position:absolute;left:0;right:0;bottom:0;height:4px;
    background:linear-gradient(90deg,var(--red),var(--accent))}
  .hdr-row{display:flex;align-items:center;gap:13px}
  .logo{width:54px;height:54px;border-radius:15px;flex:0 0 auto;
    background:#fff;display:grid;place-items:center;overflow:hidden;
    box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .logo img{width:100%;height:100%;object-fit:contain}
  .logo .ph{font-size:26px}
  .club-name{font-weight:800;font-size:20px;letter-spacing:-.3px;line-height:1.1}
  .club-sub{font-size:12px;opacity:.72;letter-spacing:.12em;text-transform:uppercase;margin-top:3px}

  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .h2{font-size:18px;font-weight:800;letter-spacing:-.2px;margin:0}

  /* ---------- Content ---------- */
  .wrap{padding:16px}
  .section-head{display:flex;align-items:center;justify-content:space-between;margin:22px 2px 10px}
  .section-head:first-child{margin-top:6px}

  .card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);padding:15px}
  .stack>*+*{margin-top:11px}

  /* ---------- Next match hero (scoreboard) ---------- */
  .hero{
    margin:-12px 16px 0; position:relative; color:#fff; border-radius:20px; padding:16px 16px 18px;
    background:linear-gradient(160deg,var(--red) 0%, var(--red-dark) 100%);
    box-shadow:0 12px 30px rgba(225,29,42,.35); overflow:hidden;
  }
  .hero::before{content:"🏀";position:absolute;right:-14px;top:-18px;font-size:96px;opacity:.12;transform:rotate(-12deg)}
  .hero .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;opacity:.9}
  .hero .teams{display:flex;align-items:center;gap:10px;margin:10px 0 4px;font-weight:800;font-size:17px;line-height:1.15}
  .hero .vs{font-size:12px;opacity:.85;font-weight:700;padding:3px 8px;border:1px solid rgba(255,255,255,.4);border-radius:20px}
  .hero .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;opacity:.95;margin-top:8px}
  .hero .meta span{display:inline-flex;align-items:center;gap:5px}
  .cd{display:flex;gap:8px;margin-top:14px}
  .cd .u{background:rgba(0,0,0,.22);border-radius:12px;padding:8px 0;flex:1;text-align:center}
  .cd .n{font-size:22px;font-weight:800;line-height:1}
  .cd .t{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.8;margin-top:3px}
  .hero.live{background:linear-gradient(160deg,var(--ink) 0%, var(--ink-2) 100%);box-shadow:0 12px 30px rgba(0,0,0,.3)}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 rgba(255,122,26,.7);animation:p 1.4s infinite}
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(255,122,26,.6)}70%{box-shadow:0 0 0 9px rgba(255,122,26,0)}100%{box-shadow:0 0 0 0 rgba(255,122,26,0)}}

  /* ---------- Match row ---------- */
  .match{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);
    border-radius:14px;box-shadow:var(--shadow)}
  .match+.match{margin-top:9px}
  .m-when{flex:0 0 50px;text-align:center}
  .m-when .wd{font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:2px}
  .m-when .d{font-size:12px;font-weight:800;color:var(--ink)}
  .m-when .h{font-size:12px;color:var(--muted);margin-top:1px}
  .m-mid{flex:1;min-width:0}
  .m-opp{font-weight:700;font-size:15px;line-height:1.25;overflow-wrap:anywhere}
  .m-sub{font-size:11.5px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
  .m-sub .pin{display:inline-flex;align-items:center;gap:3px}
  .ha{font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
    padding:2px 6px;border-radius:6px}
  .ha.home{background:rgba(225,29,42,.12);color:var(--red)}
  .ha.away{background:rgba(23,23,28,.08);color:var(--ink)}
  .mcat{font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 7px;border-radius:6px;border:1px solid var(--line);color:var(--muted);background:#fff}
  .m-score{flex:0 0 auto;text-align:right;min-width:58px}
  .m-score .sc{font-size:18px;font-weight:800;letter-spacing:.5px}
  .m-score .res{font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase}
  .res.w{color:var(--win)} .res.l{color:var(--loss)} .res.t{color:var(--accent)}
  .m-score .soon{font-size:11px;color:var(--muted);font-weight:700}

  /* ---------- Tournament block ---------- */
  .trn{margin-bottom:18px}
  .trn-head{display:flex;align-items:flex-start;gap:10px;padding:0 2px 10px}
  .trn-title{font-weight:800;font-size:17px;letter-spacing:-.2px;flex:1}
  .trn-dates{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600}
  .cat{margin-top:6px}
  .cat-head{display:flex;align-items:center;gap:8px;margin:12px 2px 8px}
  .cat-name{font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:800;color:var(--red)}
  .cat-line{flex:1;height:1px;background:var(--line)}

  /* ---------- Chips / buttons ---------- */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
    font-weight:700;font-size:14px;padding:11px 15px;border-radius:13px;background:var(--ink);color:#fff}
  .btn:active{transform:translateY(1px)}
  .btn.red{background:var(--red)}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line)}
  .btn.block{width:100%}
  .btn.sm{padding:8px 12px;font-size:13px;border-radius:11px}
  .icon-btn{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
    background:rgba(23,23,28,.05);color:var(--ink)}
  .icon-btn.red{background:rgba(225,29,42,.1);color:var(--red)}
  .fab{position:fixed;right:max(14px,calc(50% - 260px + 14px));bottom:96px;z-index:30;
    width:56px;height:56px;border-radius:18px;background:var(--red);color:#fff;
    display:grid;place-items:center;box-shadow:0 10px 24px rgba(225,29,42,.45)}
  .addbtn{width:100%;margin-top:10px;border:1.5px dashed var(--line);color:var(--muted);background:transparent;font-weight:700}
  .addbtn:active{border-color:var(--red);color:var(--red)}
  .addtrn{margin:2px 0 18px}
  .trn-actions{margin:0 0 14px}
  svg{display:block}

  /* ---------- Reports ---------- */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .stat{background:var(--card);border-radius:15px;box-shadow:var(--shadow);padding:14px}
  .stat .v{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1}
  .stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-top:6px}
  .stat.full{grid-column:1/-1}
  .stat .v.win{color:var(--win)} .stat .v.red{color:var(--red)}
  .wl{display:flex;gap:14px;align-items:baseline}
  .wl b{font-size:26px;font-weight:800}
  .bar{height:9px;border-radius:6px;background:var(--line);overflow:hidden;margin-top:10px;display:flex}
  .bar i{display:block;height:100%}
  .trow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .trow:last-child{border-bottom:0}
  .trow .nm{font-weight:700;font-size:14px}
  .trow .sm{font-size:11.5px;color:var(--muted);margin-top:2px}
  .pill{font-size:12px;font-weight:800;padding:3px 9px;border-radius:20px;background:rgba(23,23,28,.06)}

  .filters{display:flex;gap:10px;margin-bottom:16px}
  .filters .fsel{flex:1;min-width:0}
  .filters label{display:block;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
  .filters select{width:100%;padding:11px 34px 11px 13px;border:1.5px solid var(--line);border-radius:12px;
    background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%236C6C76' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><path d='M3 5l4 4 4-4'/></svg>") no-repeat right 12px center;
    color:var(--ink);font-weight:700;font-size:14px;appearance:none;-webkit-appearance:none;text-overflow:ellipsis}
  .filters select:focus{outline:none;border-color:var(--red)}

  .empty{text-align:center;color:var(--muted);padding:38px 20px}
  .empty .e{font-size:42px}
  .empty p{margin:10px 0 16px;font-size:14px}

  .muted{color:var(--muted)}
  .note{font-size:12.5px;color:var(--muted);line-height:1.5}

  /* ---------- Bottom nav ---------- */
  .nav{position:fixed;left:0;right:0;bottom:0;z-index:40;
    background:rgba(255,255,255,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);display:flex;
    padding:6px 8px calc(6px + env(safe-area-inset-bottom));max-width:520px;margin:0 auto}
  .nav button{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    padding:6px 0;color:var(--muted);font-size:10.5px;font-weight:700;letter-spacing:.02em}
  .nav button.on{color:var(--red)}
  .nav .ic{width:23px;height:23px}

  /* ---------- Modal ---------- */
  .ov{position:fixed;inset:0;z-index:60;background:rgba(20,20,24,.5);
    display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
  .ov.show{opacity:1;pointer-events:auto}
  .sheet{background:var(--bg);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    padding:8px 18px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;
    transform:translateY(100%);transition:transform .25s cubic-bezier(.2,.8,.2,1)}
  .ov.show .sheet{transform:translateY(0)}
  .grab{width:42px;height:5px;border-radius:5px;background:var(--line);margin:8px auto 14px}
  .sheet h3{margin:0 0 16px;font-size:19px;font-weight:800;letter-spacing:-.3px}
  .fld{margin-bottom:13px}
  .fld label{display:block;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px}
  .fld input,.fld select{width:100%;padding:12px 13px;border:1.5px solid var(--line);border-radius:12px;
    background:#fff;color:var(--ink)}
  .fld input:focus,.fld select:focus{outline:none;border-color:var(--red)}
  .two{display:flex;gap:10px}.two>*{flex:1}
  .scorein{display:flex;align-items:center;gap:10px}
  .scorein input{text-align:center;font-size:24px;font-weight:800;padding:14px 6px}
  .scorein .x{font-weight:800;color:var(--muted)}
  .toggle{display:flex;background:rgba(23,23,28,.05);border-radius:12px;padding:3px;gap:3px}
  .toggle button{flex:1;padding:11px;border-radius:9px;font-weight:700;font-size:14px;color:var(--muted)}
  .toggle button.on{background:#fff;color:var(--ink);box-shadow:0 2px 6px rgba(0,0,0,.08)}
  .sheet-actions{display:flex;gap:10px;margin-top:18px}
  .sheet-actions .btn{flex:1}
  .del-link{display:block;text-align:center;color:var(--red);font-weight:700;font-size:14px;margin-top:16px;padding:8px}

  /* ---------- Print / PDF program ---------- */
  #printroot{display:none}
  @media print{
    @page{margin:14mm}
    body{background:#fff}
    #app,#overlay,#toast{display:none!important}
    #printroot{display:block;color:#000;font-size:13px}
    #printroot .pr-head{display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--red);padding-bottom:12px}
    #printroot .pr-logo{width:54px;height:54px;border-radius:10px;object-fit:contain;border:1px solid #ddd}
    #printroot .pr-title{font-size:21px;font-weight:800}
    #printroot .pr-sub{font-size:12.5px;color:#444;margin-top:3px}
    #printroot .pr-day{font-size:14px;font-weight:800;color:var(--red);margin:16px 0 4px;
      border-bottom:1px solid #bbb;padding-bottom:4px}
    #printroot .pr-sec.brk{page-break-before:always}
    #printroot .pr-cat-h{font-size:18px;font-weight:800;color:#000;margin:18px 0 2px;padding-bottom:8px;border-bottom:2px solid #000}
    #printroot .pr-cat-sub{display:block;font-size:11px;font-weight:600;color:#555;margin-top:3px}
    #printroot .pr-row{display:flex;gap:12px;align-items:flex-start;padding:7px 2px;border-bottom:1px solid #eee;page-break-inside:avoid}
    #printroot .pr-time{font-weight:800;width:46px;flex:0 0 auto;font-variant-numeric:tabular-nums}
    #printroot .pr-opp{flex:1;font-weight:700;line-height:1.3}
    #printroot .pr-meta{font-weight:500;color:#555;font-size:11.5px;margin-top:2px}
    #printroot .pr-venue{width:160px;flex:0 0 auto;text-align:right;color:#222;font-weight:600}
    #printroot .pr-foot{margin-top:20px;padding-top:8px;border-top:1px solid #ddd;font-size:10.5px;color:#777}
  }
  .toast{position:fixed;left:50%;bottom:108px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 18px;border-radius:13px;font-size:13.5px;font-weight:600;
    z-index:80;opacity:0;transition:.25s;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.3)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<script>
/* ===================== State & persistence ===================== */
const KEY='toyin_basket_app_v1';
let state, tab='home', cdTimer=null, repTrn='all', repCat='all';

const ICON={
  home:'<path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v10h14V10"/>',
  cal:'<rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/>',
  chart:'<path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/>',
  gear:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1"/>',
  pin:'<path d="M12 21s7-6.2 7-11a7 7 0 1 0-14 0c0 4.8 7 11 7 11z"/><circle cx="12" cy="10" r="2.4"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  edit:'<path d="M4 20h4L19 9l-4-4L4 16v4z"/><path d="M14 6l4 4"/>',
  trash:'<path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  share:'<path d="M4 12v8h16v-8M12 16V3M7 8l5-5 5 5"/>',
  up:'<path d="M4 12v8h16v-8M12 3v13M7 8l5-5 5 5"/>',
  flame:'<path d="M12 3s4 4 4 8a4 4 0 1 1-8 0c0-1.5 1-3 1-3s3 1 3-5z"/>',
  doc:'<path d="M7 3h8l4 4v14H7z"/><path d="M15 3v4h4"/><path d="M10 13h6M10 17h4"/>'
};
const svg=(p,c='currentColor',w=23,sw=2)=>`<svg class="ic" viewBox="0 0 24 24" width="${w}" height="${w}" fill="none" stroke="${c}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;

function loadState(){
  let embedded=null, stored=null;
  try{embedded=JSON.parse(document.getElementById('app-data').textContent);}catch(e){}
  try{stored=JSON.parse(localStorage.getItem(KEY));}catch(e){}
  if(embedded&&stored){
    if((embedded.stamp||0)>(stored.stamp||0)){state=embedded;persist();toast('Date actualizate din acest fișier');}
    else state=stored;
  } else state=stored||embedded||{version:1,stamp:0,club:{name:'Clubul meu',short:'',logo:null,primary:'#E11D2A',ink:'#17171C'},tournaments:[]};
  if(!state.club) state.club={name:'Clubul meu',short:'',logo:null,primary:'#E11D2A',ink:'#17171C'};
  if(!state.tournaments) state.tournaments=[];
}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}
function save(){state.stamp=Date.now();persist();}
const uid=p=>(p||'id')+'_'+Math.random().toString(36).slice(2,8);

/* ===================== Helpers ===================== */
const RO_MON=['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec'];
const RO_MONF=['ianuarie','februarie','martie','aprilie','mai','iunie','iulie','august','septembrie','octombrie','noiembrie','decembrie'];
const RO_WD=['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
const RO_WDS=['Dum','Lun','Mar','Mie','Joi','Vin','Sâm'];
function wdIdx(iso){if(!iso)return -1;return new Date(iso+'T12:00:00').getDay();}
function wkFull(iso){const i=wdIdx(iso);return i<0?'':RO_WD[i];}
function wkShort(iso){const i=wdIdx(iso);return i<0?'':RO_WDS[i];}
function dObj(m){return (m&&m.date)?new Date(m.date+'T'+(m.time||'00:00')):null;}
function fmtD(iso){if(!iso)return'';const[y,mo,d]=iso.split('-');return `${(+d)} ${RO_MON[+mo-1]}`;}
function fmtDFull(iso){if(!iso)return'';const[y,mo,d]=iso.split('-');return `${(+d)} ${RO_MONF[+mo-1]} ${y}`;}
function fmtRange(a,b){if(!a)return'';if(!b||a===b)return fmtDFull(a);const A=a.split('-'),B=b.split('-');
  if(A[0]===B[0]&&A[1]===B[1])return `${+A[2]}–${+B[2]} ${RO_MONF[+A[1]-1]} ${A[0]}`;
  if(A[0]===B[0])return `${+A[2]} ${RO_MON[+A[1]-1]} – ${+B[2]} ${RO_MON[+B[1]-1]} ${A[0]}`;
  return `${fmtD(a)} ${A[0]} – ${fmtD(b)} ${B[0]}`;}
const hasScore=m=>m&&m.scoreFor!=null&&m.scoreAgainst!=null&&m.scoreFor!==''&&m.scoreAgainst!=='';
function result(m){if(!hasScore(m))return null;const f=+m.scoreFor,a=+m.scoreAgainst;return f>a?'w':f<a?'l':'t';}
function allMatches(){const out=[];state.tournaments.forEach(t=>t.categories.forEach(c=>c.matches.forEach(m=>out.push({m,c,t}))));return out;}
function sortedTournaments(){return [...state.tournaments].sort((a,b)=>{
  const da=(a.startDate||''),db=(b.startDate||'');
  if(da!==db)return db.localeCompare(da);
  return (b.createdAt||0)-(a.createdAt||0);});}
function nextMatch(){
  const now=new Date();let best=null,bestLive=null;
  allMatches().forEach(x=>{const d=dObj(x.m);if(!d)return;
    const end=new Date(d.getTime()+45*60000);
    if(now>=d&&now<=end&&!hasScore(x.m)){if(!bestLive||d<dObj(bestLive.m))bestLive=x;}
    if(d>now&&!hasScore(x.m)){if(!best||d<dObj(best.m))best=x;}});
  return bestLive?{...bestLive,live:true}:best;
}
function theme(){
  document.documentElement.style.setProperty('--red',state.club.primary||'#E11D2A');
  document.documentElement.style.setProperty('--ink',state.club.ink||'#17171C');
}

function logoHTML(){return state.club.logo?`<img src="${state.club.logo}" alt="">`:`<span class="ph">🏀</span>`;}
function header(sub){

  }

  // today + upcoming
  const now=new Date();const today=now.toISOString().slice(0,10);
  const up=allMatches().filter(x=>{const d=dObj(x.m);return d&&(d>=new Date(now.getTime()-45*60000));})
    .sort((a,b)=>dObj(a.m)-dObj(b.m)).slice(0,6);
  const recent=allMatches().filter(x=>hasScore(x.m)).sort((a,b)=>dObj(b.m)-dObj(a.m)).slice(0,3);

  return header('Baschet · Constanța')+hero+`<div class="wrap">
    ${up.length?`<div class="section-head"><h2 class="h2">Ce urmează</h2></div>${up.map(x=>matchRow(x.m,x.c,x.t,true)).join('')}`:''}
    ${recent.length?`<div class="section-head"><h2 class="h2">Rezultate recente</h2></div>${recent.map(x=>matchRow(x.m,x.c,x.t,true)).join('')}`:''}
    ${(!up.length&&!recent.length)?emptyState('Niciun meci încă','Treci la Program și adaugă primul turneu.'):''}
  </div>`;
}
function startCountdown(){
  const el=document.getElementById('cd');if(!el)return;
  const nx=nextMatch();if(!nx)return;const target=dObj(nx.m);
  const tick=()=>{const el=document.getElementById('cd');if(!el){clearInterval(cdTimer);return;}
    let s=Math.max(0,Math.floor((target-new Date())/1000));
    const dd=Math.floor(s/86400);s-=dd*86400;const hh=Math.floor(s/3600);s-=hh*3600;const mm=Math.floor(s/60);const ss=s-mm*60;
    const u=(n,t)=>`<div class="u"><div class="n tnum">${String(n).padStart(2,'0')}</div><div class="t">${t}</div></div>`;
    el.innerHTML=(dd>0?u(dd,'zile'):'')+u(hh,'ore')+u(mm,'min')+u(ss,'sec');
    if(target-new Date()<=0){clearInterval(cdTimer);render();}};
  tick();cdTimer=setInterval(tick,1000);
}

/* ---------- match row ---------- */
function matchRow(m,c,t,readonly){
  const r=result(m);
  let scoreHTML;
  if(hasScore(m)){
    const us=m.scoreFor,th=m.scoreAgainst;
    const resTxt=r==='w'?'Victorie':r==='l'?'Înfrângere':'Egal';
    scoreHTML=`<div class="m-score"><div class="sc tnum">${us}–${th}</div><div class="res ${r}">${resTxt}</div></div>`;
  } else {
    const d=dObj(m);const future=d&&d>new Date();
    scoreHTML=`<div class="m-score"><div class="soon">${future?'urmează':'—'}</div></div>`;
  }
  const onclick=readonly?'':`onclick="openMatch('${t.id}','${c.id}','${m.id}')"`;
  return `<div class="match" ${onclick} ${readonly?`onclick="goEdit('${t.id}','${c.id}','${m.id}')"`:''}>
    <div class="m-when"><div class="wd">${wkShort(m.date)}</div><div class="d tnum">${fmtD(m.date)}</div><div class="h tnum">${esc(m.time||'')}</div></div>
    <div class="m-mid">
      <div class="m-opp">${esc(m.opponent||'Adversar')}</div>
      <div class="m-sub">
        ${readonly?`<span class="mcat">${esc(c.name)}${state.tournaments.length>1?' · '+esc(t.name):''}</span>`:''}
        <span class="ha ${m.isHome?'home':'away'}">${m.isHome?'Acasă':'Deplasare'}</span>
        ${m.venue?`<span class="pin">${svg(ICON.pin,'currentColor',12,2.2)} ${esc(m.venue)}</span>`:''}
      </div>
    </div>${scoreHTML}</div>`;
}
function goEdit(t,c,m){openMatch(t,c,m);}

  let body;
  if(!ts.length){body=emptyState('Niciun turneu','Apasă „Adaugă turneu" ca să începi.');}

      const list=ms.length?ms.map(m=>matchRow(m,c,t,false)).join(''):`<div class="note" style="padding:6px 4px 2px">Niciun meci încă.</div>`;
      return `<div class="cat">
        <div class="cat-head"><span class="cat-name">${esc(c.name)}</span><span class="cat-line"></span>

      <div class="trn-actions">
        <button class="btn ghost sm block" onclick="openCategory('${t.id}',null)">${svg(ICON.plus,'currentColor',16,2.2)} Adaugă categorie</button>

/* ---------- REPORTS ---------- */
function computeStats(matches){
  const played=matches.filter(hasScore);
  let w=0,l=0,t=0,pf=0,pa=0,best=null,worst=null;
  played.forEach(m=>{const f=+m.scoreFor,a=+m.scoreAgainst;pf+=f;pa+=a;const diff=f-a;
    if(f>a)w++;else if(f<a)l++;else t++;
    if(diff>0&&(!best||diff>(+best.scoreFor-+best.scoreAgainst)))best=m;
    if(diff<0&&(!worst||diff<(+worst.scoreFor-+worst.scoreAgainst)))worst=m;});
  const n=played.length;
  return {n,w,l,t,pf,pa,af:n?pf/n:0,aa:n?pa/n:0,diff:pf-pa,best,worst,total:matches.length};
}
function catNames(){const s=new Set();state.tournaments.forEach(t=>t.categories.forEach(c=>s.add(c.name)));return[...s];}
function viewReports(){
  const trns=sortedTournaments();
  // categoriile disponibile țin cont de turneul ales
  let catList;
  if(repTrn!=='all'){const tt=findT(repTrn);catList=tt?tt.categories.map(c=>c.name):[];}
  else catList=catNames();
  const cats=[...new Set(catList)];
  if(repTrn!=='all'&&!findT(repTrn))repTrn='all';
  if(repCat!=='all'&&!cats.includes(repCat))repCat='all';

  // filtrare meciuri
  let entries=allMatches();
  if(repTrn!=='all')entries=entries.filter(x=>x.t.id===repTrn);
  if(repCat!=='all')entries=entries.filter(x=>x.c.name===repCat);
  const matches=entries.map(x=>x.m);
  const st=computeStats(matches);

  const seg=`<div class="filters">
    <div class="fsel"><label>Turneu</label>
      <select onchange="setRepTrn(this.value)">
        <option value="all"${repTrn==='all'?' selected':''}>Toate turneele</option>
        ${trns.map(t=>`<option value="${t.id}"${repTrn===t.id?' selected':''}>${esc(t.name)}</option>`).join('')}
      </select></div>
    <div class="fsel"><label>Categorie</label>
      <select onchange="setRepCat(this.value)">
        <option value="all"${repCat==='all'?' selected':''}>Toate categoriile</option>
        ${cats.map(c=>`<option value="${esc(c)}"${repCat===c?' selected':''}>${esc(c)}</option>`).join('')}
      </select></div>
  </div>`;

  if(st.n===0){
    return header('Rapoarte')+`<div class="wrap">${seg}
      ${emptyState('Niciun rezultat încă','Introdu scorurile la meciuri și statisticile apar aici automat.')}</div>`;
  }
  const wpct=st.n?Math.round(st.w/st.n*100):0;
  const wWidth=st.n?(st.w/st.n*100):0,lWidth=st.n?(st.l/st.n*100):0,tWidth=st.n?(st.t/st.n*100):0;

  // defalcare pe turnee (doar când nu e selectat un turneu anume)
  const perT=repTrn!=='all'?'':sortedTournaments().map(t=>{
    let ms=[];t.categories.forEach(c=>{if(repCat==='all'||c.name===repCat)ms=ms.concat(c.matches);});
    const s=computeStats(ms);if(s.n===0)return'';
    return `<div class="trow">
      <div><div class="nm">${esc(t.name)}</div><div class="sm">${s.n} meciuri · ${s.w}V ${s.l}Î · medie ${s.af.toFixed(1)}–${s.aa.toFixed(1)}</div></div>
      <div class="pill" style="color:${s.diff>0?'var(--win)':s.diff<0?'var(--red)':'var(--ink)'}">${s.diff>0?'+':''}${s.diff}</div>
    </div>`;}).join('');

  const bw=st.best, ww=st.worst;
  return header('Rapoarte')+`<div class="wrap">
    ${seg}
    <div class="stats">
      <div class="stat full">
        <div class="wl"><span><b style="color:var(--win)">${st.w}</b> <span class="muted" style="font-size:13px">victorii</span></span>
        <span><b style="color:var(--loss)">${st.l}</b> <span class="muted" style="font-size:13px">înfrângeri</span></span>
        ${st.t?`<span><b style="color:var(--accent)">${st.t}</b> <span class="muted" style="font-size:13px">egal</span></span>`:''}
        <span style="margin-left:auto;font-weight:800;font-size:15px">${wpct}%</span></div>
        <div class="bar"><i style="width:${wWidth}%;background:var(--win)"></i><i style="width:${tWidth}%;background:var(--accent)"></i><i style="width:${lWidth}%;background:var(--loss)"></i></div>
      </div>
      <div class="stat"><div class="v tnum">${st.n}</div><div class="k">Meciuri jucate</div></div>
      <div class="stat"><div class="v tnum ${st.diff>0?'win':st.diff<0?'red':''}">${st.diff>0?'+':''}${st.diff}</div><div class="k">Diferență coș</div></div>
      <div class="stat"><div class="v tnum">${st.af.toFixed(1)}</div><div class="k">Medie înscrise</div></div>
      <div class="stat"><div class="v tnum">${st.aa.toFixed(1)}</div><div class="k">Medie primite</div></div>
      <div class="stat"><div class="v tnum">${st.pf}</div><div class="k">Total înscrise</div></div>
      <div class="stat"><div class="v tnum">${st.pa}</div><div class="k">Total primite</div></div>
    </div>

    ${bw||ww?`<div class="section-head"><h2 class="h2">Repere</h2></div><div class="card stack">
      ${bw?`<div style="display:flex;justify-content:space-between;align-items:center"><div><div class="eyebrow" style="color:var(--win)">Cea mai mare victorie</div><div style="font-weight:700;margin-top:3px">vs ${esc(bw.opponent)}</div></div><div class="sc tnum" style="font-size:18px;font-weight:800;color:var(--win)">${bw.scoreFor}–${bw.scoreAgainst}</div></div>`:''}
      ${ww?`<div style="display:flex;justify-content:space-between;align-items:center"><div><div class="eyebrow" style="color:var(--red)">Cea mai grea înfrângere</div><div style="font-weight:700;margin-top:3px">vs ${esc(ww.opponent)}</div></div><div class="sc tnum" style="font-size:18px;font-weight:800;color:var(--red)">${ww.scoreFor}–${ww.scoreAgainst}</div></div>`:''}
    </div>`:''}

    ${perT?`<div class="section-head"><h2 class="h2">Pe turnee</h2></div><div class="card">${perT}</div>`:''}
    <div class="note" style="margin-top:16px">Statisticile se calculează automat din meciurile cu scor introdus.</div>
  </div>`;
}
function setRepTrn(v){repTrn=v;repCat='all';render();}
function setRepCat(v){repCat=v;render();}

function navBar(){

/* ===================== Empty state ===================== */
function emptyState(title,sub){return `<div class="empty"><div class="e">🏀</div><div style="font-weight:800;font-size:16px;color:var(--ink)">${title}</div><p>${sub}</p></div>`;}

/* ===================== Modals ===================== */
const ov=document.getElementById('overlay'),sheetEl=document.getElementById('sheet');
function openSheet(html){sheetEl.innerHTML='<div class="grab"></div>'+html;ov.classList.add('show');}
function closeSheet(){ov.classList.remove('show');}
/* fereastra se închide doar prin buton (Salvează / Renunță) — nu la atingere în afară */

function findT(id){return state.tournaments.find(t=>t.id===id);}
function findC(t,id){return t.categories.find(c=>c.id===id);}
function findM(c,id){return c.matches.find(m=>m.id===id);}

/* ----- Tournament ----- */
function openTournament(id){
  const t=id?findT(id):null;
  openSheet(`<h3>${t?'Editează turneul':'Turneu nou'}</h3>
    <div class="fld"><label>Denumire</label><input id="t_name" value="${t?esc(t.name):''}" placeholder="ex. CSN U10 2026"></div>
    <div class="fld"><label>Locație (opțional)</label><input id="t_loc" value="${t?esc(t.location||''):''}" placeholder="ex. Sala Sporturilor, Constanța"></div>
    <div class="two">
      <div class="fld"><label>Început</label><input id="t_start" type="date" value="${t?t.startDate||'':''}"></div>
      <div class="fld"><label>Sfârșit</label><input id="t_end" type="date" value="${t?t.endDate||'':''}"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Renunță</button>
      <button class="btn red" onclick="saveTournament('${id||''}')">Salvează</button>
    </div>
    ${t?`<a class="del-link" onclick="delTournament('${id}')">Șterge turneul</a>`:''}`);
}
function saveTournament(id){
  const name=val('t_name').trim();if(!name){toast('Adaugă o denumire');return;}
  const data={name,location:val('t_loc').trim(),startDate:val('t_start'),endDate:val('t_end')};
  if(id){Object.assign(findT(id),data);}
  else{state.tournaments.push({id:uid('t'),...data,createdAt:Date.now(),categories:[]});}
  save();closeSheet();render();toast(id?'Turneu actualizat':'Turneu adăugat');
}
function delTournament(id){
  if(!confirm('Ștergi turneul și toate meciurile lui?'))return;
  state.tournaments=state.tournaments.filter(t=>t.id!==id);save();closeSheet();render();toast('Turneu șters');
}

/* ----- Category ----- */
function openCategory(tid,cid){
  const t=findT(tid),c=cid?findC(t,cid):null;
  openSheet(`<h3>${c?'Editează categoria':'Categorie nouă'}</h3>
    <div class="note" style="margin-bottom:12px">Categorie de vârstă (ex. Baby, Mini, U10 Masculin).</div>
    <div class="fld"><label>Denumire</label><input id="c_name" value="${c?esc(c.name):''}" placeholder="ex. Baby"></div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Renunță</button>
      <button class="btn red" onclick="saveCategory('${tid}','${cid||''}')">Salvează</button>
    </div>
    ${c?`<a class="del-link" onclick="delCategory('${tid}','${cid}')">Șterge categoria</a>`:''}`);
}
function saveCategory(tid,cid){
  const name=val('c_name').trim();if(!name){toast('Adaugă o denumire');return;}
  const t=findT(tid);
  if(cid){findC(t,cid).name=name;}else{t.categories.push({id:uid('c'),name,matches:[]});}
  save();closeSheet();render();toast('Salvat');
}
function delCategory(tid,cid){
  if(!confirm('Ștergi categoria și meciurile ei?'))return;
  const t=findT(tid);t.categories=t.categories.filter(c=>c.id!==cid);save();closeSheet();render();toast('Categorie ștearsă');
}

/* ----- Match ----- */
let mForm={isHome:true};
function openMatch(tid,cid,mid){
  const t=findT(tid),c=findC(t,cid),m=mid?findM(c,mid):null;
  mForm.isHome=m?!!m.isHome:true;
  openSheet(`<h3>${m?'Editează meciul':'Meci nou'}</h3>
    <div class="note" style="margin-bottom:12px">${esc(t.name)} · ${esc(c.name)}</div>
    <div class="fld"><label>Adversar</label><input id="m_opp" value="${m?esc(m.opponent||''):''}" placeholder="ex. CSM Corona Brașov"></div>
    <div class="fld"><label>Locul jocului</label>
      <div class="toggle" id="m_ha">
        <button class="${mForm.isHome?'on':''}" onclick="setHA(true)">Acasă</button>
        <button class="${!mForm.isHome?'on':''}" onclick="setHA(false)">Deplasare</button>
      </div></div>
    <div class="two">
      <div class="fld"><label>Data</label><input id="m_date" type="date" value="${m?m.date||'':''}"></div>
      <div class="fld"><label>Ora</label><input id="m_time" type="time" value="${m?m.time||'':''}"></div>
    </div>
    <div class="fld"><label>Teren / sală</label><input id="m_venue" value="${m?esc(m.venue||''):''}" placeholder="ex. Terenul MasterCard"></div>
    <div class="fld"><label>Etapă (opțional)</label><input id="m_round" value="${m?esc(m.round||''):''}" placeholder="ex. Etapa 3"></div>
    <div class="fld"><label>Scor (lasă gol dacă nu s-a jucat)</label>
      <div class="scorein">
        <input id="m_sf" type="number" inputmode="numeric" placeholder="—" value="${m&&m.scoreFor!=null?m.scoreFor:''}">
        <span class="x">:</span>
        <input id="m_sa" type="number" inputmode="numeric" placeholder="—" value="${m&&m.scoreAgainst!=null?m.scoreAgainst:''}">
      </div>
      <div class="note" style="margin-top:6px;text-align:center">stânga = Toyin · dreapta = adversar</div>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Renunță</button>
      <button class="btn red" onclick="saveMatch('${tid}','${cid}','${mid||''}')">Salvează</button>
    </div>
    ${m?`<a class="del-link" onclick="delMatch('${tid}','${cid}','${mid}')">Șterge meciul</a>`:''}`);
}
function setHA(h){mForm.isHome=h;document.querySelectorAll('#m_ha button').forEach((b,i)=>b.classList.toggle('on',(i===0)===h));}
function saveMatch(tid,cid,mid){
  const opp=val('m_opp').trim();if(!opp){toast('Adaugă adversarul');return;}
  const sf=val('m_sf'),sa=val('m_sa');
  const data={opponent:opp,isHome:mForm.isHome,date:val('m_date'),time:val('m_time'),
    venue:val('m_venue').trim(),round:val('m_round').trim(),
    scoreFor:sf===''?null:+sf,scoreAgainst:sa===''?null:+sa};
  const c=findC(findT(tid),cid);
  if(mid){Object.assign(findM(c,mid),data);}else{c.matches.push({id:uid('m'),...data});}
  save();closeSheet();render();toast(mid?'Meci actualizat':'Meci adăugat');
}
function delMatch(tid,cid,mid){
  if(!confirm('Ștergi acest meci?'))return;
  const c=findC(findT(tid),cid);c.matches=c.matches.filter(m=>m.id!==mid);save();closeSheet();render();toast('Meci șters');
}

/* ----- Club ----- */
function openClub(){
  openSheet(`<h3>Clubul</h3>
    <div class="fld"><label>Nume complet</label><input id="cl_name" value="${esc(state.club.name||'')}"></div>
    <div class="fld"><label>Nume scurt (apare în meciuri)</label><input id="cl_short" value="${esc(state.club.short||'')}" placeholder="ex. Toyin"></div>
    <div class="two">
      <div class="fld"><label>Culoare principală</label><input id="cl_primary" type="color" value="${state.club.primary||'#E11D2A'}" style="height:48px;padding:4px"></div>
      <div class="fld"><label>Culoare închisă</label><input id="cl_ink" type="color" value="${state.club.ink||'#17171C'}" style="height:48px;padding:4px"></div>
    </div>
    <div class="sheet-actions">
      <button class="btn ghost" onclick="closeSheet()">Renunță</button>
      <button class="btn red" onclick="saveClub()">Salvează</button>
    </div>`);
}
function saveClub(){
  state.club.name=val('cl_name').trim()||'Clubul meu';
  state.club.short=val('cl_short').trim();
  state.club.primary=val('cl_primary');state.club.ink=val('cl_ink');
  save();closeSheet();render();toast('Salvat');
}
function uploadLogo(e){
  const f=e.target.files[0];if(!f)return;
  if(f.size>900000){toast('Imagine prea mare (max ~900 KB)');return;}
  const r=new FileReader();r.onload=()=>{state.club.logo=r.result;save();render();toast('Siglă încărcată');};
  r.readAsDataURL(f);
}
function removeLogo(){state.club.logo=null;save();render();}

/* ===================== Program PDF (print) ===================== */
function printSchedule(tid,cid){
  const t=findT(tid);if(!t){toast('Turneu negăsit');return;}
  const single=!!cid;
  const cats=single?t.categories.filter(c=>c.id===cid):t.categories;
  const multiCat=t.categories.length>1;
  const catName=single&&cats[0]?cats[0].name:'';
  const subLine=`${esc(t.name)}${t.location?' · '+esc(t.location):''}${t.startDate?' · '+esc(fmtRange(t.startDate,t.endDate)):''}${single&&catName?' · '+esc(catName):''}`;

  // doar categoriile care au meciuri
  const filled=cats.filter(c=>c.matches.length);

  let html=`<div class="pr-head">
    ${state.club.logo?`<img class="pr-logo" src="${state.club.logo}">`:''}
    <div><div class="pr-title">${esc(state.club.name)}</div>
    <div class="pr-sub">${subLine}</div></div>
  </div>`;

  if(!filled.length){
    html+='<p style="margin-top:18px">Niciun meci programat.</p>';
  } else {
    filled.forEach((c,idx)=>{
      const rows=[...c.matches].sort((a,b)=>{const da=dObj(a),db=dObj(b);if(da&&db)return da-db;if(da)return -1;if(db)return 1;return 0;});
      // la export pe tot turneul, fiecare categorie pe pagina ei
      html+=`<div class="pr-sec${(!single&&idx>0)?' brk':''}">`;
      if(!single&&multiCat)html+=`<div class="pr-cat-h">${esc(c.name)}<span class="pr-cat-sub">${esc(state.club.name)} · ${subLine}</span></div>`;
      let curDay=null;
      rows.forEach(m=>{
        if(m.date!==curDay){curDay=m.date;
          html+=`<div class="pr-day">${m.date?(wkFull(m.date)+', '+fmtDFull(m.date)):'Dată nestabilită'}</div>`;}
        const ha=m.isHome?'Acasă':'Deplasare';
        const sc=hasScore(m)?` · scor ${m.scoreFor}–${m.scoreAgainst}`:'';
        html+=`<div class="pr-row">
          <div class="pr-time">${esc(m.time||'')}</div>
          <div class="pr-opp">vs ${esc(m.opponent||'')}
            <div class="pr-meta">${ha}${m.round?' · '+esc(m.round):''}${sc}</div></div>
          <div class="pr-venue">${esc(m.venue||'')}</div>
        </div>`;
      });
      html+=`</div>`;
    });
  }
  html+=`<div class="pr-foot">Program ${esc(state.club.name)} · generat ${new Date().toLocaleDateString('ro-RO')}. Orele și terenurile se pot modifica — verificați înainte de deplasare.</div>`;
  const root=document.getElementById('printroot');root.innerHTML=html;
  toast('Alege „Salvează ca PDF" în fereastra de printare');
  setTimeout(()=>window.print(),250);
}


function buildHTML(){
  const clone=document.documentElement.cloneNode(true);
  const appEl=clone.querySelector('#app');if(appEl)appEl.innerHTML='';
  const o=clone.querySelector('#overlay');if(o){const s=o.querySelector('#sheet');if(s)s.innerHTML='';o.classList.remove('show');}
  const tEl=clone.querySelector('#toast');if(tEl){tEl.className='toast';tEl.textContent='';}
  const pr=clone.querySelector('#printroot');if(pr)pr.innerHTML='';
  const ds=clone.querySelector('#app-data');
  if(ds)ds.textContent=JSON.stringify(state).replace(/<\//g,'<\\/');
  return '<!DOCTYPE html>\n'+clone.outerHTML;
}
async function exportApp(){
  const html=buildHTML();
  const fn=(state.club.short||state.club.name||'Club').replace(/[^\w]+/g,'_')+'_Baschet.html';
  const blob=new Blob([html],{type:'text/html'});
  try{
    if(navigator.canShare){
      const file=new File([blob],fn,{type:'text/html'});
      if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:state.club.name});toast('Pregătit de trimis');return;}
    }
  }catch(e){}
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=fn;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  toast('Fișier salvat — trimite-l pe WhatsApp/email');
}
function importApp(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      let txt=r.result,data;
      const m=txt.match(/<script id="app-data"[^>]*>([\s\S]*?)<\/script>/);
      if(m)data=JSON.parse(m[1].replace(/<\\\//g,'</'));
      else data=JSON.parse(txt);
      if(!data||!data.tournaments)throw 0;
      if(!confirm('Înlocuiești datele de acum cu cele din fișier?'))return;
      state=data;save();render();toast('Date încărcate');
    }catch(err){toast('Fișier necitibil');}
  };
  r.readAsText(f);e.target.value='';
}

/* ===================== Utils ===================== */
function val(id){const el=document.getElementById(id);return el?el.value:'';}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
let toastT=null;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);}

/* ===================== Boot ===================== */
loadState();render();
</script>
